<!DOCTYPE html>

<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Restaurant Menu</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1a5c3a;--g2:#1d6e46;--g3:#e8f4ec;--acc:#2e8b57;
  --gold:#c9a84c;--red:#e53935;--offer:#d84315;
  --txt:#1a1a1a;--muted:#6b7280;--border:rgba(0,0,0,0.09);
  --white:#fff;--bg:#f0f0eb;--card:#f7f7f4;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* RTL support */
body.rtl{direction:rtl;text-align:right}
body.rtl .banner-overlay{text-align:right}
body.rtl .item-tags{left:auto;right:8px}
body.rtl .offer-badge{left:8px;right:auto}
body.rtl .item-footer{flex-direction:row-reverse}
body.rtl .cart-row-sub{text-align:left}
body.rtl .search-input-row{flex-direction:row-reverse}
body.rtl .lang-btn{font-family:'Noto Kufi Arabic',Tahoma,Arial,sans-serif}
body.rtl .item-name,body.rtl .item-desc,body.rtl .section-heading{font-family:'Noto Kufi Arabic',Tahoma,Arial,sans-serif}
body.rtl .restaurant-info h1,body.rtl .banner-name{font-family:'Noto Kufi Arabic',Tahoma,Arial,sans-serif}

/* LOADING */
#loadingOverlay{position:fixed;inset:0;z-index:9999;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loadingOverlay .spin{width:48px;height:48px;border:4px solid var(--g3);border-top-color:var(--g1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingOverlay p{font-size:15px;color:var(--muted)}

/* BANNER */
.banner{position:relative;width:100%;max-height:200px;height:200px;overflow:hidden;background:#0f3d25;will-change:max-height;transition:max-height .42s cubic-bezier(.4,0,.2,1)}
@media(min-width:768px){.banner{max-height:280px;height:280px}}
@media(min-width:1024px){.banner{max-height:340px;height:340px}}
.banner.hidden{max-height:0!important;pointer-events:none}
.banner-inner{width:100%;height:100%;position:relative;overflow:hidden}
.banner-img{width:100%;height:100%;object-fit:cover;display:block}
.banner-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;gap:20px;background:linear-gradient(135deg,#0f3d25,#1d6e46 40%,#1a5c3a 70%,#0d2e1c);position:absolute;inset:0}
.banner-fallback::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.banner-plate{position:relative;z-index:1;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:46px;flex-shrink:0}
.banner-plate:nth-child(3){width:130px;height:130px;font-size:58px;border-color:rgba(201,168,76,.5)}
.banner-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,rgba(0,0,0,.1) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:18px 20px;pointer-events:none}
.banner-name{font-family:'Playfair Display',Georgia,'Times New Roman',serif;font-size:26px;font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5)}
.banner-desc{font-size:13px;color:rgba(255,255,255,.82);margin-top:4px;text-shadow:0 1px 4px rgba(0,0,0,.4)}

/* ═══════════════════════════════════════════════
   HEADER
   Mobile (<540px): column layout
     Row 1: [logo] [name + desc]  — full width, no wrapping
     Row 2: buttons — full width, all pushed to the RIGHT
   Desktop (≥540px): single row — logo+name left, buttons right
   ═══════════════════════════════════════════════ */
.site-header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);transition:box-shadow .3s;direction:ltr}
.site-header.scrolled{box-shadow:0 2px 16px rgba(0,0,0,.10)}

/* Outer wrapper — COLUMN on mobile */
.header-inner{
  display:flex;
  flex-direction:column;
  padding:10px 14px 8px;
  gap:6px;
  transition:padding .3s;
  direction:ltr;
}
.header-inner.big{padding:12px 16px 10px}

/* Row 1: logo + name/desc — full width, single line */
.hdr-row1{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  min-width:0;
  overflow:hidden;
}

/* Row 2: buttons — full width, ALL buttons to the RIGHT */
.hdr-row2{
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
  flex-wrap:nowrap;
  justify-content:flex-end;   /* ← always right */
  width:100%;
}

/* Logo */
.logo-wrap{flex-shrink:0;width:40px;height:40px;transition:width .3s,height .3s}
.logo-wrap.big{width:50px;height:50px}
.logo-circle{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--acc));display:flex;align-items:center;justify-content:center;font-size:19px;border:3px solid rgba(201,168,76,.4);overflow:hidden;transition:font-size .3s}
.logo-wrap.big .logo-circle{font-size:24px;border-width:4px;border-color:rgba(201,168,76,.6)}
.logo-circle img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* Restaurant info — never wraps, always ellipsis */
.restaurant-info{flex:1 1 0;min-width:0;overflow:hidden;direction:ltr}
.restinfo-name-row{display:flex;align-items:center;gap:5px;min-width:0;overflow:hidden;direction:ltr}
.restaurant-info h1{
  font-family:'Playfair Display',Georgia,'Times New Roman',serif;
  font-size:15px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  transition:font-size .3s;
  min-width:0;
  text-align:left;
  line-height:1.2;
}
.restaurant-info p{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:left;
}
.header-inner.big .restaurant-info h1{font-size:17px}
.header-inner.big .restaurant-info p{font-size:12px}

/* Location icon */
.location-link{flex-shrink:0;display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--g3);color:var(--g1);border:1.5px solid rgba(26,92,58,.2);transition:background .15s,border-color .15s}
.location-link:hover{background:var(--g1);color:var(--white);border-color:var(--g1)}

/* Action buttons */
.icon-btn{border:1.5px solid var(--border);border-radius:8px;padding:5px 9px;background:var(--white);cursor:pointer;font-size:15px;transition:background .15s,border-color .15s;display:flex;align-items:center;justify-content:center;height:30px}
.icon-btn:hover{background:var(--g3);border-color:var(--g1)}

.cat-toggle-btn{border:1.5px solid var(--txt);border-radius:8px;padding:4px 10px;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;background:var(--white);cursor:pointer;color:var(--txt);transition:background .15s,color .15s;white-space:nowrap;height:30px}
.cat-toggle-btn:hover{background:var(--txt);color:var(--white)}

/* Lang toggle */
.lang-btn{border:1.5px solid var(--gold);border-radius:8px;padding:4px 9px;font-size:10px;font-weight:700;background:var(--white);cursor:pointer;color:var(--g1);transition:background .15s,color .15s;white-space:nowrap;letter-spacing:.3px;text-align:center;direction:ltr;height:30px}
.lang-btn:hover{background:var(--gold);color:var(--white)}
.lang-btn.ar-active{background:var(--gold);color:#fff;font-family:'Noto Kufi Arabic',Tahoma,Arial,sans-serif}

/* OLD class stubs kept for JS compatibility */
.hdr-actions{display:contents}
.hdr-bottom-row{display:contents}

/* ── DESKTOP (≥540px): flip to single row ── */
@media(min-width:540px){
  .header-inner{
    flex-direction:row;
    align-items:center;
    padding:10px 20px;
    gap:10px;
    min-height:60px;
  }
  .header-inner.big{min-height:70px;padding:12px 24px}
  /* row1 takes remaining space, row2 stays right naturally */
  .hdr-row1{flex:1;width:auto}
  .hdr-row2{width:auto}
  .logo-wrap{width:48px;height:48px}
  .logo-wrap.big{width:60px;height:60px}
  .logo-circle{font-size:22px}
  .logo-wrap.big .logo-circle{font-size:28px}
  .restaurant-info h1{font-size:17px}
  .header-inner.big .restaurant-info h1{font-size:20px}
  .restaurant-info p{font-size:12px}
  .icon-btn{padding:7px 12px;font-size:17px;height:34px}
  .view-toggle-btn{width:32px}
  .view-toggle-wrap{height:34px}
  .cat-toggle-btn{font-size:13px;padding:6px 13px;height:34px}
  .lang-btn{font-size:12px;padding:6px 11px;height:34px}
}
@media(min-width:768px){
  .header-inner{padding:12px 32px}
  .header-inner.big{padding:14px 32px}
}
@media(min-width:1024px){
  .header-inner{padding:12px 48px}
  .header-inner.big{padding:14px 48px}
  .restaurant-info h1{font-size:19px}
  .header-inner.big .restaurant-info h1{font-size:22px}
}

/* DIVIDER */
.divider-bar{height:7px;background:linear-gradient(90deg,#1a5c3a,#2e8b57,#c9a84c,#2e8b57,#1a5c3a)}

/* SEARCH BAR */
.search-wrap{background:var(--white);padding:10px 18px;border-bottom:1px solid var(--border)}
.search-wrap.hidden{display:none}
.search-input-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:8px 14px}
.search-input-row svg{flex-shrink:0;color:var(--muted)}
.search-input{border:none;background:transparent;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;color:var(--txt);flex:1;outline:none}
.search-input::placeholder{color:var(--muted)}
.search-clear{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted);padding:0;line-height:1;display:none}
.search-clear.visible{display:block}

/* OFFERS STRIP */
.offers-strip{background:var(--white);padding:6px 18px;border-bottom:1px solid var(--border);overflow:hidden}
.offers-strip-label{font-size:11px;font-weight:700;color:var(--offer);text-transform:uppercase;letter-spacing:.5px;margin-bottom:0;display:none}
.offers-strip-inner{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;align-items:center}
.offers-strip-inner::-webkit-scrollbar{display:none}

/* OFFER CHIP */
.offer-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#fff5f0,#fff0e8);border:1.5px solid #f4a57a;border-radius:30px;padding:5px 12px 5px 6px;cursor:pointer;transition:transform .18s,box-shadow .18s;height:36px}
.offer-chip:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(216,67,21,.15)}
.offer-chip-img{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.offer-chip-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.offer-chip-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.offer-chip-name{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px}
.offer-chip-cats{display:none}
.offer-chip-cat-tag{display:none}
.offer-chip-cat-tag.spicy{background:#c62828;color:#fff}
.offer-chip-cat-tag.veg{background:#2e7d32;color:#fff}
.offer-chip-cat-tag.non-veg{background:#bf360c;color:#fff}
.offer-chip-cat-tag.popular{background:#f57c00;color:#fff}
.offer-chip-cat-tag.new{background:#1565c0;color:#fff}
.offer-chip-prices{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
.offer-chip-new{font-size:12px;font-weight:700;color:var(--offer)}
.offer-chip-old{font-size:10px;color:var(--muted);text-decoration:line-through}
.offer-badge-strip{background:#e53935;color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap}

/* CATEGORIES BAR */
.categories-bar{background:var(--white);padding:10px 18px;display:flex;gap:9px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch;transition:max-height .35s ease,opacity .25s ease,padding .25s ease;max-height:80px;opacity:1}
.categories-bar.cat-hidden{max-height:0!important;opacity:0!important;padding-top:0!important;padding-bottom:0!important;overflow:hidden!important;border-bottom:none!important}
.categories-bar::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:7px 15px;border-radius:30px;border:2px solid var(--border);background:var(--white);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;font-weight:400;color:var(--muted);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;display:flex;align-items:center;gap:5px}
.cat-pill img{width:18px;height:18px;border-radius:4px;object-fit:cover;flex-shrink:0}
.cat-pill:hover{border-color:var(--acc);color:var(--acc)}
.cat-pill.active{background:var(--g1);color:var(--white);border-color:var(--g1);font-weight:700;font-size:15px;padding:9px 20px;box-shadow:0 4px 14px rgba(26,92,58,.3);transform:scale(1.06)}
.cat-pill.offer-pill.active{background:linear-gradient(135deg,#d84315,#e53935);border-color:#d84315;box-shadow:0 4px 14px rgba(229,57,53,.35)}
body.rtl .cat-pill{font-family:'Noto Kufi Arabic',Tahoma,Arial,sans-serif}

/* MAIN */
.items-section{padding:14px 14px 130px}
@media(min-width:540px) and (max-width:767px){.items-section{padding:16px 18px 130px}}
@media(min-width:768px) and (max-width:834px){.items-section{padding:18px 22px 130px}}
@media(min-width:835px) and (max-width:1023px){.items-section{padding:20px 28px 130px}}
@media(min-width:1024px){.items-section{padding:24px 48px 130px}}
.section-heading{font-size:17px;font-weight:700;color:var(--txt);margin:22px 0 12px;display:flex;align-items:center;gap:10px;scroll-margin-top:160px}
@media(min-width:768px){.section-heading{font-size:20px;margin:30px 0 16px}}
.section-heading:first-child{margin-top:0}
.section-heading .label-bar{width:5px;height:20px;background:var(--gold);border-radius:3px;flex-shrink:0;display:inline-block}
.section-heading.offer-heading .label-bar{background:var(--offer)}

/* GRID */
.items-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

/* Small phones — single column */
@media(max-width:359px){
  .items-grid{grid-template-columns:1fr;gap:10px}
}

/* Standard phones (360–539px) — 2 columns */
@media(min-width:360px) and (max-width:539px){
  .items-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}

/* Large / flip phones (540–767px) — 3 columns */
@media(min-width:540px) and (max-width:767px){
  .items-grid{grid-template-columns:repeat(3,1fr);gap:12px}
}

/* iPad mini (768–834px) — 3 columns */
@media(min-width:768px) and (max-width:834px){
  .items-grid{grid-template-columns:repeat(3,1fr);gap:14px}
}

/* iPad / iPad Air (835–1023px) — 4 columns */
@media(min-width:835px) and (max-width:1023px){
  .items-grid{grid-template-columns:repeat(4,1fr);gap:16px}
}

/* iPad Pro / small laptops (1024–1279px) — 4 columns */
@media(min-width:1024px) and (max-width:1279px){
  .items-grid{grid-template-columns:repeat(4,1fr);gap:18px}
}

/* Desktop (1280px+) — 5 columns */
@media(min-width:1280px){
  .items-grid{grid-template-columns:repeat(5,1fr);gap:20px}
}

/* ═══════════════════════════════════════════════
   ITEM CARD — DEFAULT (grid / tile view)
   Card is a column: image on top, body below.
   Used when .items-grid does NOT have .bar-view class.
   ═══════════════════════════════════════════════ */
.item-card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  transition:transform .18s,box-shadow .18s;
  position:relative;
}
.item-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(26,92,58,.12)}

/* Thumbnail — full-width square-ish image for grid view */
.item-thumb{
  width:100%;
  aspect-ratio:1/.9;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:52px;
  position:relative;
  overflow:hidden;
  background:#eceae7;
}
.item-thumb img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0}
.item-thumb .thumb-emoji{position:relative;z-index:1;font-size:52px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.10))}

/* Offer badge — rotated sticker on top-right of thumb */
.offer-badge{position:absolute;top:8px;right:8px;z-index:5;background:linear-gradient(135deg,#d84315,#e53935);color:#fff;font-size:10px;font-weight:700;padding:4px 8px;border-radius:20px;transform:rotate(3deg);box-shadow:0 2px 8px rgba(229,57,53,.4);letter-spacing:.3px}
body.rtl .offer-badge{right:auto;left:8px;transform:rotate(-3deg)}

/* ── Tag chips — GRID VIEW ──
   Small absolute tags stacked in top-left corner of thumb.
   In bar view: overridden to vertically centered pill column on left of circle. */
.item-tags{
  position:absolute;
  top:8px;
  left:8px;
  z-index:5;
  display:flex;
  flex-direction:column;
  gap:3px;
  align-items:flex-start;
}
body.rtl .item-tags{left:auto;right:8px;align-items:flex-end;}

/* Base tag — compact pill for grid view */
.tag{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:9px;
  font-weight:700;
  padding:2px 7px;
  border-radius:20px;
  letter-spacing:.3px;
  white-space:nowrap;
  line-height:1.3;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}

/* Tag colors */
.tag.new{background:#1565c0;color:#fff}
.tag.popular{background:#f57c00;color:#fff}
.tag.spicy{background:#c62828;color:#fff}
.tag.veg{background:#2e7d32;color:#fff}
.tag.non-veg,.tag.nonveg{background:#bf360c;color:#fff}
.tag.most-selling,.tag.bestseller,.tag.best-seller{background:#7b1fa2;color:#fff}

/* Card body — sits below the thumbnail */
.item-body{padding:10px 12px 12px;display:flex;flex-direction:column;flex:1}
.item-name{font-size:13px;font-weight:700;color:var(--txt);line-height:1.3}
@media(min-width:768px){.item-name{font-size:15px}}
.item-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
@media(min-width:768px){.item-desc{font-size:12px}}
.item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.price-block{display:flex;flex-direction:column}
.item-price{font-size:14px;font-weight:700;color:var(--g1)}
.item-price.offer-price{color:var(--offer)}
.item-old-price{font-size:11px;color:var(--muted);text-decoration:line-through;line-height:1}
.save-label{font-size:9px;font-weight:700;color:var(--offer);margin-top:1px}




/* ═══════════════════════════════════════════════
   BAR VIEW — .bar-view on .items-grid
   Layout: card is a row with image at a FIXED left offset (52px margin)
   so ALL images always start at the same X position.
   Tags are absolutely positioned in that 52px left zone.
   Cards without tags just have clean empty left space — images stay aligned.
   ═══════════════════════════════════════════════ */

.items-grid.bar-view{
  grid-template-columns:1fr !important;
  gap:10px;
}
@media(min-width:540px){
  .items-grid.bar-view{ grid-template-columns:repeat(2,1fr) !important; gap:12px; }
}
@media(min-width:1024px){
  .items-grid.bar-view{ grid-template-columns:repeat(3,1fr) !important; gap:14px; }
}
@media(min-width:1280px){
  .items-grid.bar-view{ grid-template-columns:repeat(4,1fr) !important; gap:16px; }
}

/* Card */
.items-grid.bar-view .item-card{
  flex-direction:row;
  align-items:stretch;
  border-radius:16px;
  border:1px solid var(--border);
  background:var(--card);
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  min-height:120px;
  padding:0;
  gap:0;
  overflow:hidden;
  position:relative;
}
.items-grid.bar-view .item-card:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(26,92,58,.13);
}

/* Tags: absolutely placed in the 52px left zone — no column, no border, no bg */
.items-grid.bar-view .item-tags{
  position:absolute;
  top:0;
  left:0;
  width:52px;
  height:100%;
  z-index:4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding:8px 4px;
  pointer-events:none;
}
body.rtl .items-grid.bar-view .item-tags{
  left:auto;
  right:0;
}

/* Tag pill */
.items-grid.bar-view .tag{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:8.5px;
  font-weight:700;
  padding:3px 6px;
  border-radius:20px;
  white-space:nowrap;
  letter-spacing:.2px;
  width:44px;
  text-align:center;
  box-shadow:0 1px 4px rgba(0,0,0,.22);
  pointer-events:auto;
}

/* Image: always starts at 52px from left — fixed offset guarantees vertical alignment */
.items-grid.bar-view .item-thumb{
  width:120px;
  min-width:120px;
  flex:0 0 120px;
  height:auto;
  aspect-ratio:unset;
  border-radius:0;
  background:#eceae7;
  position:relative;
  overflow:hidden;
  align-self:stretch;
  margin-left:52px;         /* ← THIS is what aligns all images in one column */
}
body.rtl .items-grid.bar-view .item-thumb{
  margin-left:0;
  margin-right:52px;
}
.items-grid.bar-view .item-thumb img{
  border-radius:0;
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  inset:0;
}
.items-grid.bar-view .item-thumb .thumb-emoji{
  font-size:36px;
  position:relative;
  z-index:1;
}

/* Offer badge */
.items-grid.bar-view .offer-badge{
  top:8px;
  right:10px;
  transform:rotate(0deg);
  font-size:9px;
  padding:3px 7px;
  z-index:5;
}
body.rtl .items-grid.bar-view .offer-badge{
  right:auto;
  left:10px;
}

/* Body */
.items-grid.bar-view .item-body{
  padding:12px 14px;
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  text-align:left;
}

/* Name */
.items-grid.bar-view .item-name{
  font-size:13px;
  font-weight:700;
  line-height:1.35;
  white-space:normal;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  width:100%;
  text-align:left;
}
@media(min-width:540px){
  .items-grid.bar-view .item-name{ font-size:14px; }
}

/* Desc */
.items-grid.bar-view .item-desc{
  font-size:11px;
  margin-top:3px;
  color:var(--muted);
  -webkit-line-clamp:2;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  overflow:hidden;
  width:100%;
  text-align:left;
  line-height:1.4;
}

/* Footer */
.items-grid.bar-view .item-footer{
  margin-top:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:nowrap;
  gap:8px;
  width:100%;
}


/* ═══════════════════════════════════════════════
   VIEW TOGGLE BUTTON GROUP  ▦ ▬

.view-toggle-btn:hover{background:var(--g3);color:var(--g1)}

.view-toggle-btn.active{

// ═══════════════════════════════════════════════════

const CUR = 'AED';


// ═══════════════════════════════════════════════════

let MENU=[], CATEGORIES=[], OFFERS=[], INFO={};

let scrollSpyObserver=null;
let lang='en'; // 'en' or 'ar'

const TAG_CONFIG={

// UI strings

  en:{

// ═══════════════════════════════════════════════════
//  LANGUAGE TOGGLE
// ═══════════════════════════════════════════════════
function toggleLang(){
  lang = lang==='en' ? 'ar' : 'en';
  const isAr = lang==='ar';
  document.documentElement.lang = lang;
  document.documentElement.dir  = isAr ? 'rtl' : 'ltr';
  document.body.classList.toggle('rtl', isAr);
  document.getElementById('langBtn').textContent = T[lang].langBtn;
  document.getElementById('langBtn').classList.toggle('ar-active', isAr);
  document.getElementById('catToggleBtn').textContent = T[lang].menu;
  document.getElementById('searchInput').placeholder = T[lang].search;

function init(raw){
  try{ parseInfo(raw.info||[1]); }       catch(ex){ console.warn('parseInfo:',ex); }
  try{ parseItemsSheet(raw.items||[]); } catch(ex){ console.warn('parseItems:',ex); }
  applyInfo();
  buildCategoryBar();
  buildOffersStrips();
  renderAllSections();
  document.getElementById('loadingOverlay').style.display='none';
}

// ═══════════════════════════════════════════════════
//  GOOGLE DRIVE IMAGE URL CONVERTER
// ═══════════════════════════════════════════════════
function normImg(url) {
  if (!url) return '';
  // Match both /file/d/ID/view and /open?id=ID formats
  const m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w1000';
  return url; // not a Drive link — return as-is
}

// ═══════════════════════════════════════════════════
//  INFO PARSER
//  Info sheet: row[0]=header, row[1]=values
//  Col: 0=name 1=description 2=location 3=logo 4=banner
//       5=cafeteria number 6=rider number 7=track url
//       8=name_ar 9=description_ar
// ═══════════════════════════════════════════════════
function parseInfo(rows){
  if(!rows||!rows.length) return;
  const v = rows.length>=2 ? rows[1] : rows[0];
  const col = n => String(v[n]||'').trim();
  INFO={
    name:         col(0) || 'Restaurant',
    desc:         col(1) || '',
    location:     col(2) || '',
    logo_url:     normImg(col(3)),
    banner_url:   normImg(col(4)),
    cafeteria_wa: col(5),
    rider_number: col(6),
    track_url:    col(7),
    name_ar:      col(8) || '',
    desc_ar:      col(9) || ''
  };
  if(!INFO.track_url && INFO.cafeteria_wa){
    INFO.track_url=`https://wa.me/${INFO.cafeteria_wa.replace(/\D/g,'')}`;
  }
}
// ═══════════════════════════════════════════════════
//  ITEMS PARSER
//  Col 0 = Category (EN)  Col 1 = Item Name (EN)  Col 2 = Desc (EN)
//  Col 3 = Price          Col 4 = Offer Price      Col 5 = Cat Icon
//  Col 6 = Item Image     Col 7 = Tags
//  Col 8 = Category (AR)  Col 9 = Item Name (AR)   Col 10 = Desc (AR)
// ═══════════════════════════════════════════════════
function parseItemsSheet(rows){
  if(!rows||!rows.length){ MENU=[]; CATEGORIES=[]; OFFERS=[]; return; }
  // Skip header row if first cell looks like a header
  let dataRows = rows;
  const firstCell = String(rows[0][0]||'').toLowerCase();
  if(firstCell.includes('category') || firstCell.includes('cat') || firstCell==='col' || firstCell==='#'){
    dataRows = rows.slice(1);
  }
  dataRows = dataRows.filter(r=>{
    return String(r[0]||'').trim() || String(r[1]||'').trim();
  });

  const catMap={};
  const items=[];

  dataRows.forEach((r,idx)=>{
    const col=(n)=>String(r[n]||'').trim();

    const catName   = col(0) || 'Other';
    const itemName  = col(1) || '—';
    const desc      = col(2);
    const price     = parseFloat(col(3))||0;
    const offerRaw  = col(4);
    const catIcon   = col(5);
    const imgUrl    = normImg(col(6));
    const tagsRaw   = col(7);
    const catNameAr = col(8)  || catName;
    const itemNameAr= col(9)  || itemName;
    const descAr    = col(10) || desc;

    const offerPrice = offerRaw!=='' ? parseFloat(offerRaw)||0 : 0;
    const hasOffer   = offerPrice>0 && offerPrice<price;
    const finalPrice = hasOffer ? offerPrice : price;
    const oldPrice   = hasOffer ? price : 0;
    const discPct    = hasOffer ? Math.round((price-offerPrice)/price*100) : 0;
    const saveAmt    = hasOffer ? (price-offerPrice).toFixed(2) : '0';
    const discLabel  = hasOffer ? `${discPct}% OFF` : '';
    const saveLabel  = hasOffer ? `Save ${CUR} ${saveAmt}` : '';
    const saveLabelAr= hasOffer ? `وفّر ${CUR} ${saveAmt}` : '';

    const catId = catName.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') || 'other';
    if(!catMap[catId]){
      catMap[catId]={ id:catId, name:catName, name_ar:catNameAr, icon:catIcon };
    }
    const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean) : [];

    items.push({
      id:String(idx+1), name:itemName, name_ar:itemNameAr,
      desc, desc_ar:descAr, price, finalPrice, oldPrice,
      hasOffer, discPct, saveAmt, discLabel, saveLabel, saveLabelAr,
      cats:[catId], cat:catId, image_url:imgUrl, tags, available:true
    });
  });

  MENU=items;
  CATEGORIES=Object.values(catMap);
  OFFERS=MENU.filter(i=>i.hasOffer);
}

// ═══════════════════════════════════════════════════
//  APPLY INFO
// ═══════════════════════════════════════════════════
function applyInfo(){
  const isAr = lang==='ar';
  const nm  = (isAr&&INFO.name_ar) ? INFO.name_ar : (INFO.name||'Restaurant');
  const dsc = (isAr&&INFO.desc_ar) ? INFO.desc_ar  : (INFO.desc||'');
  document.title = INFO.name || 'Restaurant Menu';
  document.getElementById('restaurantName').textContent = nm;
  document.getElementById('restaurantDesc').textContent = dsc;
  document.getElementById('bannerName').textContent     = nm;
  document.getElementById('bannerDesc').textContent     = dsc;
  // Location link
  const locLink=document.getElementById('locationLink');
  if(INFO.location){
    // If it's already a URL use it, else build a Google Maps search
    const href=INFO.location.startsWith('http')
      ? INFO.location
      : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(INFO.location)}`;
    locLink.href=href;
    locLink.style.display='flex';
  } else {
    locLink.style.display='none';
  }
  // Logo
  const lc=document.getElementById('logoCircle');
  if(INFO.logo_url){
    lc.innerHTML='';
    const img=document.createElement('img');
    img.src=INFO.logo_url; img.alt='logo';
    img.onerror=()=>{ img.remove(); };
    lc.appendChild(img);
  }
  // Banner
  const bi=document.getElementById('bannerInner');
  const prev=bi.querySelector('.banner-img');
  if(prev) prev.remove();
  if(INFO.banner_url){
    const img=document.createElement('img');
    img.className='banner-img'; img.alt='banner'; img.src=INFO.banner_url;
    img.onerror=()=>img.remove();
    img.onload=()=>{const fb=document.getElementById('bannerFallback');if(fb)fb.style.display='none';};
    bi.prepend(img);
  }
}
// ═══════════════════════════════════════════════════
//  CATEGORY BAR
// ═══════════════════════════════════════════════════
function buildCategoryBar(){
  const isAr = lang==='ar';
  const bar=document.getElementById('categoryBar');
  bar.innerHTML=`<button class="cat-pill active" data-cat="all" onclick="selectCat(this,'all')">${isAr?'الكل':'All'}</button>`;
  if(OFFERS.length){
    bar.innerHTML+=`<button class="cat-pill offer-pill" data-cat="__offers__" onclick="selectCat(this,'__offers__')">🔥 ${isAr?'العروض':'Offers'}</button>`;
  }
  CATEGORIES.forEach(cat=>{
    const isUrl=cat.icon&&(cat.icon.startsWith('http')||cat.icon.startsWith('/'));
    const iconHtml=isUrl
      ?`<img src="${e(cat.icon)}" alt="" onerror="this.remove()">`
      :(cat.icon?`<span>${cat.icon}</span>`:'');
    const label = (isAr&&cat.name_ar) ? cat.name_ar : cat.name;
    bar.innerHTML+=`<button class="cat-pill" data-cat="${e(cat.id)}" onclick="selectCat(this,'${e(cat.id)}')">${iconHtml}${e(label)}</button>`;

// ═══════════════════════════════════════════════════
//  OFFERS STRIPS
// ═══════════════════════════════════════════════════
function buildOffersStrips(){
  if(!OFFERS.length) return;
  const isAr = lang==='ar';
  const html=OFFERS.map(item=>{
    const thumb=item.image_url
      ?`<div class="offer-chip-img"><img src="${e(item.image_url)}" alt="" onerror="this.style.display='none'"></div>`
      :`<div class="offer-chip-img">🎁</div>`;
    const catTagHtml=item.tags.filter(t=>TAG_CONFIG[t]).slice(0,3).map(t=>{
      const cfg=TAG_CONFIG[t];
      return`<span class="offer-chip-cat-tag ${cfg.cls}">${isAr?cfg.label_ar:cfg.label}</span>`;
    }).join('');
    const discBadge=item.discLabel?`<span class="offer-badge-strip">${e(item.discLabel)}</span>`:'';
    const priceDetail=item.hasOffer
      ?`<span class="offer-chip-new">${CUR} ${item.finalPrice.toFixed(2)}</span><span class="offer-chip-old">${CUR} ${item.oldPrice.toFixed(2)}</span>${discBadge}`
      :`<span class="offer-chip-new">${CUR} ${item.finalPrice.toFixed(2)}</span>`;
    const nm = (isAr&&item.name_ar) ? item.name_ar : item.name;
    return`<div class="offer-chip" onclick="jumpToItem('${e(item.id)}')">
      ${thumb}
      <div class="offer-chip-info">
        <div class="offer-chip-name">${e(nm)}</div>
        ${catTagHtml?`<div class="offer-chip-cats">${catTagHtml}</div>`:''}
        <div class="offer-chip-prices">${priceDetail}</div>
      </div></div>`;
  }).join('');
  document.getElementById('offersChipsTop').innerHTML=html;
  document.getElementById('offersChipsBottom').innerHTML=html;
  syncOffersStripVisibility();
}

function syncOffersStripVisibility(){
  const top=document.getElementById('offersStripTop');
  const bot=document.getElementById('offersStripBottom');
  if(!top||!bot) return;
  if(!OFFERS.length){ top.style.display='none'; bot.style.display='none'; return; }
  const catHidden=document.getElementById('categoryBar').classList.contains('cat-hidden');
  top.style.display=catHidden?'block':'none';
  bot.style.display=catHidden?'none':'block';
}

// ═══════════════════════════════════════════════════
//  SCROLL SPY
// ═══════════════════════════════════════════════════
function initScrollSpy(){
  if(scrollSpyObserver) scrollSpyObserver.disconnect();
  scrollSpyObserver=new IntersectionObserver(entries=>{
    let top=null;
    entries.forEach(en=>{if(en.isIntersecting){if(!top||en.boundingClientRect.top<top.boundingClientRect.top)top=en}});
    if(!top) return;
    const catId=top.target.dataset.sectionCat;
    document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===catId));
    const pill=document.getElementById('categoryBar').querySelector(`[data-cat="${catId}"]`);
    if(pill) pill.scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});
  },{rootMargin:'-20% 0px -70% 0px',threshold:0});
  document.querySelectorAll('.cat-section').forEach(s=>scrollSpyObserver.observe(s));
}

function selectCat(btn,catId){
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'));

  clearSearch(true);
  if(catId==='all') renderAllSections();
  else if(catId==='__offers__') renderOffersSection();

// ═══════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
// VIEW TOGGLE — switches between 2 views: grid / bar
// viewMode: 'grid' | 'bar'
//
// grid → default tile cards (image top, body bottom)
// bar  → horizontal bar, circle image left, 2-col on desktop
//
// Adds/removes .bar-view on every .items-grid.
// Re-render is NOT needed — CSS handles the switch instantly.
// ═══════════════════════════════════════════════════
let viewMode = 'grid'; // default view on load

function viewToggle(mode){
  if(viewMode === mode) return;          // already in that mode, do nothing
  viewMode = mode;

  // Apply correct class to all .items-grid elements currently in DOM
  document.querySelectorAll('.items-grid').forEach(grid => {
    grid.classList.toggle('bar-view', mode === 'bar');
  });

  // Update toggle button active states
  document.getElementById('viewBtnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('viewBtnBar').classList.toggle('active',  mode === 'bar');
}

function toggleSearch(){
  const wrap=document.getElementById('searchWrap');
  wrap.classList.toggle('hidden');
  if(!wrap.classList.contains('hidden')) document.getElementById('searchInput').focus();
  else clearSearch(true);
}
function onSearch(val){
  document.getElementById('searchClear').classList.toggle('visible',val.length>0);
  if(!val.trim()){ renderCurrentView(); return; }
  renderSearch(val.trim().toLowerCase());
}
function clearSearch(silent=false){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('visible');
  if(!silent) renderCurrentView();
}
function renderCurrentView(){
  if(currentCat==='all') renderAllSections();
  else if(currentCat==='__offers__') renderOffersSection();
  else renderSingleSection(currentCat);
}
function renderSearch(q){
  const isAr=lang==='ar';
  const results=MENU.filter(i=>
    i.name.toLowerCase().includes(q)||
    (i.name_ar&&i.name_ar.includes(q))||
    i.desc.toLowerCase().includes(q)||
    (i.desc_ar&&i.desc_ar.includes(q))||
    i.tags.join(' ').toLowerCase().includes(q)
  );
  const container=document.getElementById('allCategorySections');
  if(!results.length){
    container.innerHTML=`<div class="no-results"><div class="big-icon">🔍</div><p>${T[lang].noItems} "<strong>${e(q)}</strong>"</p></div>`;
    return;
  }
  container.innerHTML=`<div class="section-heading"><span class="label-bar"></span>${T[lang].noItems.replace('لا توجد نتائج لـ','نتائج:').replace('No items found for','Results for')} "${e(q)}"</div><div class="items-grid${viewMode==='bar'?' bar-view':''}">${results.map(itemCardHtml).join('')}</div>`;
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function renderAllSections(){
  currentCat='all';
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat==='all'));
  const isAr=lang==='ar';
  const container=document.getElementById('allCategorySections');
  let html='';
  if(OFFERS.length){
    html+=`<div class="cat-section offer-section" data-section-cat="__offers__" id="section-__offers__">
      <div class="section-heading offer-heading"><span class="label-bar"></span>🔥 ${isAr?'عروض اليوم':"Today's Offers"}</div>
      <div class="items-grid${viewMode==='bar'?' bar-view':''}">${OFFERS.map(itemCardHtml).join('')}</div>
    </div>`;
  }
  CATEGORIES.forEach(cat=>{
    const items=MENU.filter(i=>i.cats.includes(cat.id));
    if(!items.length) return;
    const label=(isAr&&cat.name_ar)?cat.name_ar:cat.name;
    html+=`<div class="cat-section" data-section-cat="${e(cat.id)}" id="section-${e(cat.id)}">
      <div class="section-heading"><span class="label-bar"></span>${e(label)}</div>
      <div class="items-grid${viewMode==='bar'?' bar-view':''}">${items.map(itemCardHtml).join('')}</div>
    </div>`;
  });
  container.innerHTML=html||`<div class="empty-state"><div class="big-icon">🍽️</div><p>${T[lang].empty}</p></div>`;
  setTimeout(initScrollSpy,150);
}

function renderOffersSection(){
  if(scrollSpyObserver) scrollSpyObserver.disconnect();
  const isAr=lang==='ar';
  const container=document.getElementById('allCategorySections');
  if(!OFFERS.length){
    container.innerHTML=`<div class="empty-state"><div class="big-icon">🎁</div><p>${T[lang].noOffers}</p></div>`;
    return;
  }
  container.innerHTML=`<div class="cat-section offer-section" data-section-cat="__offers__" id="section-__offers__">
    <div class="section-heading offer-heading"><span class="label-bar"></span>🔥 ${isAr?'جميع العروض':'All Offers'}</div>
    <div class="items-grid${viewMode==='bar'?' bar-view':''}">${OFFERS.map(itemCardHtml).join('')}</div>
  </div>`;
}

function renderSingleSection(catId){
  if(scrollSpyObserver) scrollSpyObserver.disconnect();
  const isAr=lang==='ar';
  const items=MENU.filter(i=>i.cats.includes(catId));
  const cat=CATEGORIES.find(c=>c.id===catId);
  const container=document.getElementById('allCategorySections');
  if(!items.length){
    container.innerHTML=`<div class="empty-state"><div class="big-icon">🍽️</div><p>${T[lang].empty}</p></div>`;
    return;
  }
  const label=cat ? ((isAr&&cat.name_ar)?cat.name_ar:cat.name) : catId;
  container.innerHTML=`<div class="cat-section" data-section-cat="${e(catId)}" id="section-${e(catId)}">
    <div class="section-heading"><span class="label-bar"></span>${e(label)}</div>
    <div class="items-grid${viewMode==='bar'?' bar-view':''}">${items.map(itemCardHtml).join('')}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  ITEM CARD HTML
// ═══════════════════════════════════════════════════
function itemCardHtml(item){
  const qty=cart[item.id]||0;
  const isAr=lang==='ar';
  const nm  = (isAr&&item.name_ar)  ? item.name_ar  : item.name;
  const dsc = (isAr&&item.desc_ar)  ? item.desc_ar  : item.desc;
  const sl  = (isAr&&item.hasOffer) ? item.saveLabelAr : item.saveLabel;

  const thumb=item.image_url
    ?`<img src="${e(item.image_url)}" alt="${e(nm)}" onerror="this.remove()">`
    :`<span class="thumb-emoji">🍽️</span>`;

  const tagHtml=item.tags.filter(t=>TAG_CONFIG[t]).map(t=>{
    const cfg=TAG_CONFIG[t];
    return`<span class="tag ${cfg.cls}">${isAr?cfg.label_ar:cfg.label}</span>`;
  }).join('');

  const offerBadge=item.hasOffer?`<div class="offer-badge">${e(item.discLabel)}</div>`:'';

  const priceHtml=item.hasOffer
    ?`<div class="price-block">
        <span class="item-price offer-price">${CUR} ${item.finalPrice.toFixed(2)}</span>
        <span class="item-old-price">${CUR} ${item.oldPrice.toFixed(2)}</span>
        <span class="save-label">${e(sl)}</span>
      </div>`
    :`<div class="price-block"><span class="item-price">${CUR} ${item.finalPrice.toFixed(2)}</span></div>`;

  const qtyHtml=qty>0
    ?`<div class="qty-control"><button class="qty-btn" onclick="changeQty('${e(item.id)}',-1)">-</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${e(item.id)}',1)">+</button></div>`
    :`<button class="qty-btn add-only" onclick="changeQty('${e(item.id)}',1)">+</button>`;

  // Tags:
  // grid view → absolute overlay, only rendered if tags exist
  // bar view  → fixed-width left column, ALWAYS rendered (even empty)
  //             so cards without tags still hold the 52px column → perfect alignment
  const tagsHtml = (viewMode === 'bar')
    ? `<div class="item-tags">${tagHtml}</div>`
    : (tagHtml ? `<div class="item-tags">${tagHtml}</div>` : '');

  return`<div class="item-card" id="card-${e(item.id)}">
    ${offerBadge}
    ${tagsHtml}
    <div class="item-thumb">${thumb}</div>
    <div class="item-body">
      <div class="item-name">${e(nm)}</div>
      <div class="item-desc">${e(dsc)}</div>
      <div class="item-footer">
        ${priceHtml}
        ${qtyHtml}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
//  SCROLL — banner hides once, never re-opens via buttons
// ═══════════════════════════════════════════════════
(function(){
  const banner=document.getElementById('banner');
  const header=document.getElementById('siteHeader');
  const hInner=document.getElementById('headerInner');
  const logoW=document.getElementById('logoWrap');
  let bannerHidden=false;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY;
    if(y>60 && !bannerHidden){
      bannerHidden=true;
      banner.classList.add('hidden');
      hInner.classList.add('big');
      logoW.classList.add('big');
      header.classList.add('scrolled');
    } else if(y<=60 && bannerHidden){
      bannerHidden=false;
      banner.classList.remove('hidden');
      hInner.classList.remove('big');
      logoW.classList.remove('big');
      header.classList.remove('scrolled');
    }
  },{passive:true});
})();

// ═══════════════════════════════════════════════════
//  JUMP TO ITEM
// ═══════════════════════════════════════════════════
function jumpToItem(itemId){
  if(currentCat!=='all'){ renderAllSections(); setTimeout(()=>scrollToCard(itemId),300); }
  else scrollToCard(itemId);
}
function scrollToCard(itemId){
  const card=document.getElementById('card-'+itemId);
  if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
}

// ═══════════════════════════════════════════════════
//  QTY
// ═══════════════════════════════════════════════════
function changeQty(id,delta){
  cart[id]=Math.max(0,(cart[id]||0)+delta);
  if(cart[id]===0) delete cart[id];
  updateFooter();
  const item=MENU.find(i=>i.id===id);
  if(!item) return;
  const qty=cart[id]||0;
  const isAr=lang==='ar';
  document.querySelectorAll(`[id="card-${id}"]`).forEach(card=>{
    const footer=card.querySelector('.item-footer');
    if(!footer) return;
    const sl=(isAr&&item.hasOffer)?item.saveLabelAr:item.saveLabel;
    const priceHtml=item.hasOffer
      ?`<div class="price-block"><span class="item-price offer-price">${CUR} ${item.finalPrice.toFixed(2)}</span><span class="item-old-price">${CUR} ${item.oldPrice.toFixed(2)}</span><span class="save-label">${e(sl)}</span></div>`
      :`<div class="price-block"><span class="item-price">${CUR} ${item.finalPrice.toFixed(2)}</span></div>`;
    const qtyHtml=qty>0
      ?`<div class="qty-control"><button class="qty-btn" onclick="changeQty('${e(id)}',-1)">-</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${e(id)}',1)">+</button></div>`
      :`<button class="qty-btn add-only" onclick="changeQty('${e(id)}',1)">+</button>`;
    footer.innerHTML=priceHtml+qtyHtml;
  });
  if(document.getElementById('cartModal').classList.contains('open')) refreshCart();
}

// ═══════════════════════════════════════════════════
//  FOOTER TOTAL
// ═══════════════════════════════════════════════════
function updateFooter(){
  let total=0,count=0;
  for(const [id,qty] of Object.entries(cart)){
    const item=MENU.find(i=>i.id===id);
    if(item){ total+=item.finalPrice*qty; count+=qty; }
  }
  document.getElementById('totalAmount').textContent=`${CUR} ${total.toFixed(2)}`;
  document.getElementById('cartBadge').textContent=count;
}

//  CART MODAL
// ═══════════════════════════════════════════════════
function showCart(){
  document.getElementById('customerName').value='';
  document.getElementById('customerNote').value='';
  document.getElementById('cartModal').classList.add('open');
  refreshCart();
}
function refreshCart(){
  const isAr=lang==='ar';
  const entries=Object.entries(cart);
  if(!entries.length){
    document.getElementById('cartItems').innerHTML=`<div class="empty-state" style="padding:30px 0"><div class="big-icon">🛒</div><p>${T[lang].emptyCart}</p></div>`;
    document.getElementById('modalTotal').textContent=`${CUR} 0.00`;
    return;
  }
  let total=0;
  document.getElementById('cartItems').innerHTML=entries.map(([id,qty])=>{
    const item=MENU.find(i=>i.id===id);
    if(!item) return '';
    const sub=item.finalPrice*qty; total+=sub;
    const nm=(isAr&&item.name_ar)?item.name_ar:item.name;
    const thumb=item.image_url?`<img src="${e(item.image_url)}" alt="">`:'';
    return`<div class="cart-row">
      <div class="cart-row-thumb">${thumb||'🍽️'}</div>
      <div class="cart-row-info">
        <div class="cart-row-name">${e(nm)}</div>
        <div class="cart-row-price">${CUR} ${item.finalPrice.toFixed(2)} ${isAr?'للقطعة':'each'}</div>
      </div>
      <div class="cart-row-qty">
        <button class="cqty-btn" onclick="changeQty('${e(id)}',-1)">-</button>
        <span class="cqty-num">${qty}</span>
        <button class="cqty-btn" onclick="changeQty('${e(id)}',1)">+</button>
      </div>
      <span class="cart-row-sub">${CUR} ${sub.toFixed(2)}</span>
    </div>`;
  }).join('');
  document.getElementById('modalTotal').textContent=`${CUR} ${total.toFixed(2)}`;
}
function closeCart(){ document.getElementById('cartModal').classList.remove('open'); }
function closeCartOnBackdrop(ev){ if(ev.target===document.getElementById('cartModal')) closeCart(); }

function generateOrderNumber(total){
  const now = new Date();

  // TIME → HHMM
  const time =
    String(now.getHours()).padStart(2,'0') +
    String(now.getMinutes()).padStart(2,'0');

  // DATE → DDMM
  const date =
    String(now.getDate()).padStart(2,'0') +
    String(now.getMonth()+1).padStart(2,'0');

  // AMOUNT → ROUND
  const amount = Math.round(total);

  return `RAS${time}${amount}${date}`;
}



// ═══════════════════════════════════════════════════
//  WHATSAPP
// ═══════════════════════════════════════════════════
function sendToWhatsApp(){
  const entries = Object.entries(cart);

  if(!entries.length){
    alert(T[lang].emptyCart);
    return;
  }

  const customerName = (document.getElementById('customerName').value || '').trim();
  const customerNote = (document.getElementById('customerNote').value || '').trim();

  const isAr = lang === 'ar';
  let total = 0;

  const lines = isAr
    ? [`🍽️ *طلب جديد — ${INFO.name_ar || INFO.name || 'المطعم'}*`]
    : [`🍽️ *New Order — ${INFO.name || 'Restaurant'}*`];

  if(customerName){
    lines.push(`👤 *${customerName}*`);
  }

  lines.push('');

  // ITEMS
  entries.forEach(([id, qty])=>{
    const item = MENU.find(i => i.id === id);
    if(!item) return;

    const sub = item.finalPrice * qty;
    total += sub;

    const nm = isAr && item.name_ar ? item.name_ar : item.name;
    lines.push(`• ${nm} × ${qty}  —  ${CUR} ${sub.toFixed(2)}`);
  });

  // 🧾 GENERATE ORDER NUMBER AFTER TOTAL IS READY
  const orderNo = generateOrderNumber(total);

  // ADD ORDER NUMBER
  lines.unshift(
    isAr
      ? `🧾 رقم الطلب: *${orderNo}*`
      : `🧾 Order No: *${orderNo}*`
  );

  // NOTE
  if(customerNote){
    lines.push('');
    lines.push(
      isAr
        ? `📝 *ملاحظة:* ${customerNote}`
        : `📝 *Note:* ${customerNote}`
    );
  }

  // TOTAL
  lines.push('');
  lines.push(
    isAr
      ? `💰 *المجموع: ${CUR} ${total.toFixed(2)}*`
      : `💰 *Total: ${CUR} ${total.toFixed(2)}*`
  );

  const dest = INFO.cafeteria_wa || '';

  if(!dest){
    alert(T[lang].waNumMissing);
    return;
  }

  const phone = dest.replace(/\D/g,'');
  const text = encodeURIComponent(lines.join('\n'));

  window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${text}`, '_blank');


  // RESET CART
  cart = {};
  updateFooter();
  closeCart();
  renderCurrentView();
}
